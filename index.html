<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tum Bin - Urdu Novel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink-dark: #C2185B; 
            --pink-light: #F06292; 
            --bg: #FFF9FB; 
        }
        
        body { 
            -webkit-user-select: none; user-select: none; 
            font-family: 'Poppins', sans-serif; 
            text-align: center; background-color: var(--bg); 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* Header - Stylish Text */
        .app-header { background: white; padding: 35px 10px; border-bottom: 2px solid #eee; }
        .app-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 48px; 
            font-weight: 800; 
            color: var(--pink-dark); 
            margin: 0;
            letter-spacing: -1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .app-sub { font-size: 18px; color: #444; font-weight: 500; margin-top: 5px; }

        .info-card { 
            background: white; margin: 25px 15px; padding: 20px; border-radius: 8px;
            border: 1px solid #f1f1f1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .novel-by-text { font-weight: 600; color: #222; font-size: 20px; }
        .tagline-text { font-size: 16px; color: #666; margin-top: 8px; }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 20px 20px; }
        
        /* Stylish Slim Pink Buttons with White Outline */
        .p-btn { 
            background: linear-gradient(145deg, #ec407a, #d81b60); 
            color: white; 
            border: 2px solid white; 
            padding: 12px 5px; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 16px; 
            cursor: pointer;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.15);
            transition: 0.3s;
            outline: 1.5px solid var(--pink-dark);
        }
        .p-btn:active { transform: scale(0.96); opacity: 0.9; }

        .ad-container { margin: 10px auto 25px auto; max-width: 320px; min-height: 50px; }

        /* Fullscreen Viewer Logic */
        #novelViewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10000; display: none;
        }
        iframe { width: 100%; height: 100%; border: none; }
        
        .loader { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            border: 4px solid #f3f3f3; border-top: 4px solid var(--pink-dark); 
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

    <div id="mainPage">
        <div class="app-header">
            <h1 class="app-title">Tum Bin</h1>
            <div class="app-sub">By Husny Kanwal</div>
        </div>

        <div class="info-card">
            <div class="novel-by-text">Novel's by Husny Kanwal...</div>
            <div class="tagline-text">Novels : jo dil m uter jayn❤️...</div>
        </div>

        <div class="grid-container">
            <button class="p-btn" onclick="openNovel('1ahN2gRB3RqPLQdslo_Kh3xi6uCh3TDGU')">Part 1</button>
            <button class="p-btn" onclick="openNovel('1OrYlxuOhL7eXyQoEp3Nv24mPTFZANaDZ')">Part 2</button>
        </div>

        <div class="ad-container">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-8741169014792010" crossorigin="anonymous"></script>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-app-pub-8741169014792010"
                 data-ad-slot="5549819770"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>

    <div id="novelViewer">
        <div class="loader" id="loadSpin"></div>
        <iframe id="novelFrame" src="" onload="hideSpin()"></iframe>
    </div>

    <script>
        function openNovel(id) {
            const viewer = document.getElementById('novelViewer');
            const frame = document.getElementById('novelFrame');
            viewer.style.display = 'block';
            document.getElementById('loadSpin').style.display = 'block';
            frame.src = `https://drive.google.com/file/d/${id}/preview`;
            window.history.pushState({viewingNovel: true}, "");
        }

        window.onpopstate = function(event) {
            const viewer = document.getElementById('novelViewer');
            if (viewer.style.display === 'block') {
                viewer.style.display = 'none';
                document.getElementById('novelFrame').src = "";
            }
        };

        function hideSpin() { 
            document.getElementById('loadSpin').style.display = 'none'; 
        }

        /* Security Features */
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', e => { 
            if (e.ctrlKey && ['c','u','s','p'].includes(e.key)) e.preventDefault(); 
        });
    </script>
</body>
</html>
