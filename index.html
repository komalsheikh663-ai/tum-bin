<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tum Bin - Urdu Novel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink-dark: #C2185B; 
            --pink-light: #F06292; 
            --bg: #FFF9FB; 
        }
        
        /* STRICT SECURITY: No Selection */
        * {
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            text-align: center; background-color: var(--bg); 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .app-header { background: white; padding: 35px 10px; border-bottom: 2px solid #eee; }
        .app-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 48px; font-weight: 800; 
            color: var(--pink-dark); margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .app-sub { font-size: 18px; color: #444; font-weight: 500; margin-top: 5px; }

        .info-card { 
            background: white; margin: 25px 15px; padding: 20px; border-radius: 8px;
            border: 1px solid #f1f1f1;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .novel-by-text { font-weight: 600; color: #222; font-size: 20px; }
        .tagline-text { font-size: 16px; color: #666; margin-top: 8px; }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px 20px 20px; }
        
        .p-btn { 
            background: linear-gradient(145deg, #ec407a, #d81b60); 
            color: white; border: 2px solid white; 
            padding: 12px 5px; border-radius: 8px; 
            font-weight: 600; font-size: 16px; 
            box-shadow: 3px 3px 10px rgba(0,0,0,0.15);
            outline: 1.5px solid var(--pink-dark);
        }

        #novelViewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10000; display: none;
        }
        
        /* Overlay to block long-press on iframe */
        .guard-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10001; background: transparent;
        }

        iframe { width: 100%; height: 100%; border: none; }
        
        .loader { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            border: 4px solid #f3f3f3; border-top: 4px solid var(--pink-dark); 
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body oncontextmenu="return false;">

    <div id="mainPage">
        <div class="app-header">
            <h1 class="app-title">Tum Bin</h1>
            <div class="app-sub">By Husny Kanwal</div>
        </div>

        <div class="info-card">
            <div class="novel-by-text">Novel's by Husny Kanwal...</div>
            <div class="tagline-text">Novels : jo dil m uter jayn❤️...</div>
        </div>

        <div class="grid-container">
            <button class="p-btn" onclick="openNovel('1ahN2gRB3RqPLQdslo_Kh3xi6uCh3TDGU')">Part 1</button>
            <button class="p-btn" onclick="openNovel('1OrYlxuOhL7eXyQoEp3Nv24mPTFZANaDZ')">Part 2</button>
        </div>
    </div>

    <div id="novelViewer">
        <div class="guard-layer"></div> <div class="loader" id="loadSpin"></div>
        <iframe id="novelFrame" src="" onload="hideSpin()"></iframe>
    </div>

    <script>
        function openNovel(id) {
            const viewer = document.getElementById('novelViewer');
            const frame = document.getElementById('novelFrame');
            viewer.style.display = 'block';
            document.getElementById('loadSpin').style.display = 'block';
            frame.src = `https://docs.google.com/viewer?url=https://drive.google.com/uc?id=${id}&embedded=true`;
            window.history.pushState({viewingNovel: true}, "");
        }

        window.onpopstate = function(event) {
            document.getElementById('novelViewer').style.display = 'none';
            document.getElementById('novelFrame').src = "";
        };

        function hideSpin() { document.getElementById('loadSpin').style.display = 'none'; }

        // Extra JS Security
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 86 || e.keyCode === 85 || e.keyCode === 83)) return false;
        };
    </script>
</body>
</html>
